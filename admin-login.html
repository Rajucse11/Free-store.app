<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Free Store</title>
    
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Colors & Setup --- */
        :root {
            --bg-page: #0B0C10;      /* Ekdam deep dark background */
            --bg-card: #1A1B25;      /* Admin panel wala dark color */
            --primary-blue: #4263EB;
            --text-light: #FFFFFF;
            --text-gray: #A0A4B8;
            --input-bg: #222433;
            --border-color: #2D3047;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-light);
        }

        /* Login Card */
        .admin-login-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            margin: 20px;
        }

        /* Header / Logo */
        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background-color: rgba(66, 99, 235, 0.1);
            color: var(--primary-blue);
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            margin: 0 auto 15px auto;
            border: 1px solid rgba(66, 99, 235, 0.3);
        }

        .brand-header h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .brand-header p {
            font-size: 13px;
            color: var(--text-gray);
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 16px;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(66, 99, 235, 0.2);
        }

        .form-control::placeholder {
            color: #5A5E78;
        }

        /* Options (Remember me & Forgot pass) */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            cursor: pointer;
        }

        .forgot-pass {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: var(--text-light);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(66, 99, 235, 0.3);
        }

        .btn-login:hover {
            background-color: #3b5bdb;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Return to App */
        .return-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-gray);
            text-decoration: none;
            transition: 0.2s;
        }

        .return-link:hover {
            color: var(--text-light);
        }
        
        .return-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="admin-login-card">
        
        <!-- Brand Header -->
        <div class="brand-header">
            <div class="brand-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2>ADMIN PORTAL</h2>
            <p>Enter your credentials to access the dashboard</p>
        </div>

        <!-- Login Form -->
        <div class="form-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" class="form-control" placeholder="Admin Email Address">
        </div>

        <div class="form-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" class="form-control" placeholder="Admin Password">
        </div>

        <div class="login-options">
            <label class="remember-me">
                <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-pass">Forgot Password?</a>
        </div>

        <!-- Login Button (Redirects to admin.html) -->
        <button class="btn-login" onclick="window.location.href='admin.html'">
            Secure Login <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
        </button>

        <!-- Back to Main App -->
        <a href="index.html" class="return-link">
            <i class="fa-solid fa-arrow-left"></i> Return to Main App
        </a>

    </div>

</body>
</html>
