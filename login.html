<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Free Store App</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Colors aur Fonts Setup --- */
        :root {
            --primary-blue: #4263EB;
            --primary-purple: #7048E8;
            --bg-light: #F8F9FE;
            --text-dark: #1A1B25;
            --text-gray: #A0A4B8;
            --white: #FFFFFF;
            --border-color: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #E2E8F0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Phone ka Frame */
        .mobile-container {
            width: 380px;
            height: 800px;
            background-color: var(--white); /* Login ke liye white background achha lagta hai */
            border-radius: 35px;
            border: 8px solid #1A1B25; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .mobile-container::-webkit-scrollbar {
            display: none;
        }

        /* Top Design Element */
        .top-design {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: white;
            margin: 40px auto 30px auto;
            box-shadow: 0 10px 25px rgba(66, 99, 235, 0.3);
            transform: rotate(-10deg); /* Thoda stylish look ke liye */
        }

        .top-design i {
            transform: rotate(10deg); /* Icon ko seedha karne ke liye */
        }

        /* Login Text */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 26px;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-gray);
        }

        /* Form Styling */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 18px;
        }

        .input-field {
            width: 100%;
            padding: 16px 15px 16px 45px; /* Left padding space for icon */
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 14px;
            color: var(--text-dark);
            background-color: var(--bg-light);
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary-blue);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(66, 99, 235, 0.1);
        }

        /* Forgot Password */
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-blue);
            text-decoration: none;
            margin-bottom: 30px;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(66, 99, 235, 0.2);
            transition: 0.3s;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: var(--text-gray);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* Social Login Buttons */
        .social-login {
            display: flex;
            gap: 15px;
        }

        .btn-social {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background-color: var(--white);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .btn-social.google i { color: #EA4335; }
        .btn-social.github i { color: #1A1B25; }

        /* Sign up link */
        .bottom-text {
            text-align: center;
            margin-top: auto; /* Pushes to the bottom */
            font-size: 13px;
            color: var(--text-gray);
            padding-bottom: 10px;
        }

        .bottom-text a {
            color: var(--primary-blue);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="top-design">
            <i class="fa-solid fa-bag-shopping"></i>
        </div>

        <div class="login-header">
            <h1>Welcome Back!</h1>
            <p>Sign in to continue to Free Store</p>
        </div>

        <div class="input-group">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" class="input-field" placeholder="Email Address">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" class="input-field" placeholder="Password">
        </div>

        <a href="#" class="forgot-pass">Forgot Password?</a>

        <button class="btn-login" onclick="window.location.href='index.html'">Login</button>

        <div class="divider">Or continue with</div>

        <div class="social-login">
            <button class="btn-social google">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="btn-social github">
                <i class="fa-brands fa-github"></i> GitHub
            </button>
        </div>

        <div class="bottom-text">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>

    </div>

</body>
</html>
