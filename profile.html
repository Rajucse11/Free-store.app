<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Free Store</title>
    
    <!-- Icons ke liye FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Colors aur Fonts Setup --- */
        :root { 
            --primary-blue: #4263EB; 
            --bg-light: #F8F9FE; 
            --text-dark: #1A1B25; 
            --text-gray: #A0A4B8; 
            --white: #FFFFFF; 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background-color: #E2E8F0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* Flexbox structure for mobile container */
        .mobile-container { 
            width: 380px; 
            height: 800px; 
            background-color: var(--white); 
            border-radius: 35px; 
            border: 8px solid #1A1B25; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Scrolling content wrapper */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding-top: 40px; 
        }
        
        .content::-webkit-scrollbar { 
            display: none; 
        }
        
        /* --- Profile Header --- */
        .profile-header { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        
        .avatar { 
            width: 90px; 
            height: 90px; 
            background: #E2E8F0; 
            border-radius: 50%; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            color: var(--text-dark); 
        }
        
        .user-name { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--text-dark); 
        }
        
        .user-email { 
            font-size: 13px; 
            color: var(--text-gray); 
            margin-bottom: 25px; 
        }
        
        /* --- Stats Grid --- */
        .stats-grid { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 30px; 
        }
        
        .stat-box { 
            text-align: center; 
        }
        
        .stat-num { 
            font-weight: 700; 
            font-size: 18px; 
            color: var(--text-dark); 
        }
        
        .stat-label { 
            font-size: 11px; 
            color: var(--text-gray); 
            margin-top: 4px;
        }

        /* --- Menu List --- */
        .menu-list { 
            padding: 0 20px; 
        }
        
        .menu-item { 
            display: flex; 
            align-items: center; 
            padding: 20px 0; 
            border-bottom: 1px solid #F0F0F0; 
            cursor: pointer; 
        }
        
        .menu-item i { 
            width: 40px; 
            color: var(--text-gray); 
            font-size: 18px; 
        }
        
        .menu-item span { 
            font-size: 15px; 
            color: var(--text-dark); 
            flex-grow: 1; 
            font-weight: 500;
        }

        /* --- Bottom Nav --- */
        .bottom-nav { 
            background: var(--white); 
            display: flex; 
            justify-content: space-around; 
            padding: 20px 0; 
            border-top-left-radius: 25px; 
            border-top-right-radius: 25px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
            flex-shrink: 0; /* Ensures it doesn't shrink */
        }
        
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: var(--text-gray); 
            font-size: 11px; 
            font-weight: 500;
        }
        
        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active { 
            color: var(--primary-blue); 
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        
        <!-- Scrollable Content -->
        <div class="content">
            <div class="profile-header">
                <div class="avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-name">Codenix User</div>
                <div class="user-email">user@codenix.com</div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-num">12</div>
                        <div class="stat-label">Apps</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">25</div>
                        <div class="stat-label">Downloads</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num">5</div>
                        <div class="stat-label">Updates</div>
                    </div>
                </div>
            </div>

            <div class="menu-list">
                <div class="menu-item">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>Download History</span>
                </div>
                <div class="menu-item">
                    <i class="fa-solid fa-border-all"></i>
                    <span>My Apps</span>
                </div>
                <div class="menu-item">
                    <i class="fa-solid fa-bell"></i>
                    <span>Notifications</span>
                </div>
                <div class="menu-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </div>
                <div class="menu-item">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </div>
            </div>
        </div>

        <!-- Fixed Bottom Nav -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
            <a href="categories.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Categories</a>
            <a href="updates.html" class="nav-item"><i class="fa-solid fa-arrows-rotate"></i> Updates</a>
            <a href="profile.html" class="nav-item active"><i class="fa-regular fa-user"></i> Profile</a>
        </nav>
        
    </div>
</body>
</html>
