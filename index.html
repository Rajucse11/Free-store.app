<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Store App - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #4263EB;
            --primary-purple: #7048E8;
            --bg-light: #F8F9FE;
            --text-dark: #1A1B25;
            --text-gray: #A0A4B8;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: #E2E8F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .mobile-container { width: 380px; height: 800px; background-color: var(--bg-light); border-radius: 35px; border: 8px solid #1A1B25; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow-x: hidden; overflow-y: auto; position: relative; }
        .mobile-container::-webkit-scrollbar { display: none; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 20px 15px 20px; background-color: var(--bg-light); position: sticky; top: 0; z-index: 10; }
        .top-nav h2 { font-size: 18px; font-weight: 700; color: var(--text-dark); }
        .icon { font-size: 20px; color: var(--text-dark); cursor: pointer; transition: 0.2s; }
        .icon:hover { transform: scale(1.1); }

        .search-container { margin: 0 20px 15px 20px; background-color: var(--white); border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .search-container input { border: none; outline: none; width: 100%; font-size: 14px; color: var(--text-dark); margin-right: 10px; }
        .search-container i { color: var(--text-gray); }

        .slider-container { position: relative; margin: 0 20px 20px 20px; border-radius: 16px; overflow: hidden; height: 150px; background-color: #E2E8F0; display: flex; justify-content: center; align-items: center;}
        
        .banner-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease-in-out; border-radius: 16px; background-size: cover; background-position: center; }
        .banner-slide.active { opacity: 1; z-index: 1; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 10px 20px 15px 20px; }
        .section-header h3 { font-size: 16px; color: var(--text-dark); }
        .section-header a { font-size: 12px; color: var(--primary-blue); text-decoration: none; font-weight: 600; }

        .categories-list { display: flex; justify-content: space-between; margin: 0 20px 25px 20px; }
        .category-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-box { width: 55px; height: 55px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 22px; }
        .category-item span { font-size: 11px; color: var(--text-dark); font-weight: 500; }
        .icon-box.education { background-color: #E7F0FF; color: #4285F4; }
        .icon-box.tools { background-color: #E6F4EA; color: #34A853; }
        .icon-box.productivity { background-color: #FEF7E0; color: #FBBC04; }
        .icon-box.more { background-color: #F3E8FD; color: #A142F4; }

        .latest-apps-container { display: flex; gap: 15px; margin: 0 20px 25px 20px; overflow-x: auto; padding-bottom: 5px; min-height: 120px;}
        .latest-apps-container::-webkit-scrollbar { display: none; }
        
        .app-card { background-color: var(--white); min-width: 110px; padding: 15px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; flex-direction: column; align-items: flex-start; text-decoration: none; cursor: pointer;}
        .app-img-box { width: 45px; height: 45px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; margin-bottom: 10px; color: white; background-size: cover; background-position: center; background-color: var(--primary-blue);}
        .app-title { font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;}
        .app-version { font-size: 10px; color: var(--text-gray); margin-bottom: 5px; }
        .app-rating { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; color: var(--primary-purple);}

        .popular-apps-list { display: flex; flex-direction: column; gap: 12px; margin: 0 20px 90px 20px; min-height: 100px;}
        .popular-item { background-color: var(--white); padding: 12px; border-radius: 14px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer;}
        .popular-img-box { width: 45px; height: 45px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: white; margin-right: 15px; background-size: cover; background-position: center; background-color: var(--text-dark);}
        .popular-details { flex-grow: 1; }
        .popular-title { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        .popular-version { font-size: 11px; color: var(--text-gray); margin-top: 2px;}
        .popular-rating { font-size: 12px; font-weight: 600; color: var(--primary-blue); background: #E7F0FF; padding: 5px 10px; border-radius: 8px;}

        .bottom-nav { position: sticky; bottom: 0; z-index: 100; width: 100%; background-color: var(--white); display: flex; justify-content: space-around; padding: 15px 0 20px 0; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-gray); font-size: 11px; font-weight: 500; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary-blue); }
        
        /* Loading text styling */
        .loading-text { font-size: 12px; color: var(--text-gray); text-align: center; width: 100%; padding: 20px 0;}
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <header class="top-nav">
            <i class="fa-solid fa-bars icon"></i>
            <h2>Free Store</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fa-regular fa-bell icon"></i>
                <i class="fa-solid fa-right-from-bracket icon" style="color: #FF5722;" onclick="window.location.href='login.html'" title="Logout"></i>
            </div>
        </header>

        <div class="search-container">
            <input type="text" placeholder="Search apps, games...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="slider-container" id="bannerContainer">
            <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Banners load ho rahe hain...</div>
        </div>

        <div class="section-header">
            <h3>Categories</h3>
            <a href="#">View all</a>
        </div>
        
        <div class="categories-list">
            <div class="category-item"><div class="icon-box education"><i class="fa-solid fa-graduation-cap"></i></div><span>Education</span></div>
            <div class="category-item"><div class="icon-box tools"><i class="fa-solid fa-wrench"></i></div><span>Tools</span></div>
            <div class="category-item"><div class="icon-box productivity"><i class="fa-solid fa-check-to-slot"></i></div><span>Productivity</span></div>
            <div class="category-item"><div class="icon-box more"><i class="fa-solid fa-ellipsis"></i></div><span>More</span></div>
        </div>

        <div class="section-header">
            <h3>Latest Apps</h3>
            <a href="#">View all</a>
        </div>

        <div class="latest-apps-container" id="latestAppsContainer">
            <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Apps load ho rahi hain...</div>
        </div>

        <div class="section-header">
            <h3>Popular Apps</h3>
            <a href="#">View all</a>
        </div>

        <div class="popular-apps-list" id="popularAppsContainer">
            <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Data fetch ho raha hai...</div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i> Home</a>
            <a href="categories.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Categories</a>
            <a href="updates.html" class="nav-item"><i class="fa-solid fa-arrows-rotate"></i> Updates</a>
            <a href="profile.html" class="nav-item"><i class="fa-regular fa-user"></i> Profile</a>
        </nav>
        
    </div>

    <script>
        // AAPKA SCRIPT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvapeO2CjpCV3HtU90Rtfu12GLenU03-KIhS87OSHI_A3LzLtTk8K5T57uPG7uN66s/exec";
        let slideInterval;

        async function fetchStoreData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                // 1. Render Banners
                const bannerContainer = document.getElementById('bannerContainer');
                if(data.banners && data.banners.length > 0) {
                    bannerContainer.innerHTML = ''; 
                    data.banners.forEach((banner, index) => {
                        let activeClass = index === 0 ? 'active' : '';
                        bannerContainer.innerHTML += `
                            <div class="banner-slide ${activeClass}" style="background-image: url('${banner.url}');"></div>
                        `;
                    });
                    startBannerSlider(); 
                } else {
                    bannerContainer.innerHTML = '<div class="loading-text">No Banners Found</div>';
                }

                // 2. Render Apps
                const latestContainer = document.getElementById('latestAppsContainer');
                const popularContainer = document.getElementById('popularAppsContainer');
                
                if(data.apps && data.apps.length > 0) {
                    latestContainer.innerHTML = '';
                    popularContainer.innerHTML = '';
                    
                    data.apps.forEach((app, index) => {
                        // Latest Apps mein add karna
                        latestContainer.innerHTML += `
                            <a href="${app.apkUrl}" target="_blank" class="app-card">
                                <div class="app-img-box" style="background-image: url('${app.iconUrl}');"></div>
                                <div class="app-title">${app.name}</div>
                                <div class="app-version">${app.category}</div>
                                <div class="app-rating"><i class="fa-solid fa-download"></i> Get</div>
                            </a>
                        `;

                        // Popular Apps mein add karna (Man lijiye sab apps ko popular list mein bhi dikhana hai)
                        popularContainer.innerHTML += `
                            <div class="popular-item" onclick="window.open('${app.apkUrl}', '_blank')">
                                <div class="popular-img-box" style="background-image: url('${app.iconUrl}');"></div>
                                <div class="popular-details">
                                    <div class="popular-title">${app.name}</div>
                                    <div class="popular-version">${app.category} | Version: ${app.version || '1.0'}</div>
                                </div>
                                <div class="popular-rating">Download</div>
                            </div>
                        `;
                    });
                } else {
                    latestContainer.innerHTML = '<div class="loading-text">No Apps Uploaded Yet</div>';
                    popularContainer.innerHTML = '';
                }

            } catch (error) {
                console.error("Data load hone mein error:", error);
                document.getElementById('latestAppsContainer').innerHTML = '<div class="loading-text" style="color:red;">Error loading data.</div>';
            }
        }

        // Auto-Slider Logic
        function startBannerSlider() {
            const slides = document.querySelectorAll('.banner-slide');
            if(slides.length <= 1) return; // Ek banner ho toh slider ki zarurat nahi
            
            let currentSlide = 0; 
            clearInterval(slideInterval); // Purana interval clear karna
            
            slideInterval = setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 3000);
        }

        // Page load hote hi data fetch karna shuru karein
        window.onload = fetchStoreData;
    </script>
</body>
</html>
